---
# Configures the xdp-go-optimized daemon on Node 6 via its REST API.
# The API runs on localhost:8080 of the control node (same machine).
- name: Configure XDP forwarder on Node 6 via API
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    api_base: "http://localhost:9898/api"
    iface_ingress: "enp1s0f1np1"
    iface_egress: "enp1s0f0np0"
    blocked_udp_ports: []
    fwd_entries:
      - ip: "192.168.56.5"
        dst_mac: "64:9D:99:FF:E6:CF"   # Node 5 enp1s0f1np1
        src_mac: "64:9D:99:FF:F5:9A"   # Node 6 enp1s0f0np0
        action: "redirect"
      - ip: "192.168.56.1"
        dst_mac: "64:9D:99:FF:F5:7B"   # Node 1 enp1s0f1np1
        src_mac: "64:9D:99:FF:F5:9A"   # Node 6 enp1s0f0np0
        action: "redirect"

  tasks:
    - name: Stop XDP if already running
      ansible.builtin.uri:
        url: "{{ api_base }}/stop"
        method: POST
        status_code: [200, 409]
      ignore_errors: true

    - name: Set ingress and egress interfaces
      ansible.builtin.uri:
        url: "{{ api_base }}/system/settings"
        method: PUT
        body_format: json
        body:
          iface: "{{ iface_ingress }}"
          redirect_dev: "{{ iface_egress }}"
        status_code: 200

    - name: Start XDP program
      ansible.builtin.uri:
        url: "{{ api_base }}/start"
        method: POST
        status_code: 200

    - name: Register egress NIC in devmap (slot 0)
      ansible.builtin.uri:
        url: "{{ api_base }}/devmap"
        method: POST
        body_format: json
        body:
          slot: 0
          iface: "{{ iface_egress }}"
        status_code: 200

    - name: Add forwarding table entries
      ansible.builtin.uri:
        url: "{{ api_base }}/routes"
        method: POST
        body_format: json
        body:
          ip: "{{ item.ip }}"
          dst_mac: "{{ item.dst_mac }}"
          src_mac: "{{ item.src_mac }}"
          action: "{{ item.action }}"
        status_code: 201
      loop: "{{ fwd_entries }}"

    - name: Apply blocked UDP ports
      ansible.builtin.uri:
        url: "{{ api_base }}/config"
        method: PUT
        body_format: json
        body:
          udp_ports: "{{ blocked_udp_ports }}"
        status_code: 200
      when: blocked_udp_ports | length > 0

    - name: Verify forwarding table
      ansible.builtin.uri:
        url: "{{ api_base }}/routes"
        method: GET
        status_code: 200
      register: routes_out

    - name: Print forwarding table
      ansible.builtin.debug:
        msg: "{{ routes_out.json }}"
