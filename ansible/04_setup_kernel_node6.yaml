---
- name: Setup kernel forwarding on Node 6 (no XDP)
  hosts: 10.90.1.6
  become: true

  vars:
    xdp_bin: "/home/telmat/belajar-rania/combine-firewall-forwarder/xdp_fw_fwd"
    iface_ingress: "enp1s0f1np1"
    iface_egress:  "enp1s0f0np0"

    # Static ARP: Node 4 dan 5 pakai DPDK, ga bisa jawab ARP sendiri
    static_neighbors:
      - { ip: "192.168.46.1", mac: "64:9D:99:FF:F5:7A", dev: "enp1s0f1np1" }  # Node 1 kiri
      - { ip: "192.168.46.4", mac: "64:9D:99:FF:E7:AF", dev: "enp1s0f1np1" }  # Node 4
      - { ip: "192.168.56.1", mac: "64:9D:99:FF:F5:7B", dev: "enp1s0f0np0" }  # Node 1 kanan
      - { ip: "192.168.56.5", mac: "64:9D:99:FF:E6:CF", dev: "enp1s0f0np0" }  # Node 5

  tasks:
    - name: Unload XDP program if running
      ansible.builtin.shell: >
        {{ xdp_bin }} -d {{ iface_ingress }} --unload
      failed_when: false

    - name: Set IP on ingress interface (required for routing + static ARP)
      ansible.builtin.shell: ip addr add 192.168.46.6/24 dev {{ iface_ingress }}
      failed_when: false

    - name: Set IP on egress interface
      ansible.builtin.shell: ip addr add 192.168.56.6/24 dev {{ iface_egress }}
      failed_when: false

    - name: Enable IPv4 forwarding
      ansible.builtin.shell: sysctl -w net.ipv4.ip_forward=1

    - name: Set static ARP entries
      ansible.builtin.shell: >
        ip neigh replace {{ item.ip }} lladdr {{ item.mac }} dev {{ item.dev }} nud permanent
      loop: "{{ static_neighbors }}"

    - name: Verify IP addresses
      ansible.builtin.shell: |
        ip addr show {{ iface_ingress }} | grep inet
        ip addr show {{ iface_egress }}  | grep inet
      register: addr_out

    - name: Print IP addresses
      ansible.builtin.debug:
        msg: "{{ addr_out.stdout_lines }}"

    - name: Verify routes
      ansible.builtin.shell: ip route show | grep 192.168
      register: route_out

    - name: Print routes
      ansible.builtin.debug:
        msg: "{{ route_out.stdout_lines }}"

    - name: Verify ARP table
      ansible.builtin.shell: ip neigh show | grep 192.168
      register: arp_out

    - name: Print ARP table
      ansible.builtin.debug:
        msg: "{{ arp_out.stdout_lines }}"
