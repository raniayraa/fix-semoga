# experiment.yaml
# Per-run experiment configuration — the only file you need to edit before each sweep.
#
# Usage:
#   python experiment_runner_v2.py                           # uses this file by default
#   python experiment_runner_v2.py --config experiment.yaml
#   python experiment_runner_v2.py --config experiment.yaml --dry-run
#   python experiment_runner_v2.py --config experiment.yaml --inventory hosts-lab.ini

# Path to the infrastructure config (relative to this file, or absolute).
# Contains paths, ansible wiring, and testbed settings.
infra: infra.yaml


experiment:
  # Set to true to print every action without executing anything.
  # The script will show exactly what commands would run and what files would change.
  dry_run: false

  # Seconds of pktgen traffic to collect per experiment.
  # Longer = more stable statistics, but slower overall sweep.
  duration: 15

  # Seconds to wait after launching pktgen before sending the start signal.
  # Gives pktgen time to initialize and reach steady-state before measurement begins.
  setup_wait: 10

  # Port ranges to sweep over. Each list entry is one sweep point.
  # The script patches node*.pkt with these values before each run.
  #
  # Format:
  #   Single port:       1024         (tests exactly one destination port)
  #   Contiguous range:  "1024-1029"  (6 distinct ports, 1024 through 1029 inclusive)
  #
  # Each entry creates a separate set of experiment runs (one per forwarder × direction).
  # Add more entries to sweep across multiple port-count granularities in one session.
  ports:
    # - 1024
    # - "1024-1029"
    - "1024-1103"

  # Forwarders to benchmark. Valid values: vpp, xdp, kernel
  # Runs in the listed order for every port × direction combination.
  # Remove entries to skip forwarders you don't need for this run.
  forwarders:
    # - vpp
    - xdp
    # - kernel

  # Traffic directions to test. Valid values:
  #   41    — Node 4 sends to Node 1  (unidirectional)
  #   15    — Node 1 sends to Node 5  (unidirectional; node5.csv checked for data)
  #   15_41 — both directions at once  (bidirectional; node5.csv checked for data)
  directions:
    - "41"
    # - "15_41"


# Per-forwarder variable configuration.
# Each key matches a forwarder name in experiment.forwarders.
# The runner passes these as --extra-vars to the corresponding ansible playbook,
# overriding any defaults defined inside the playbook.
forwarders_config:
  vpp:
    vpp_poll_retries: 30
    vpp_poll_delay: 1
    bind_script: /home/telmat/scripts/bind-to-DPDK.sh
    pci_devices:
      - "0000:01:00.0"
      - "0000:01:00.1"
    port0_iface: TwentyFiveGigabitEthernet1/0/0
    port1_iface: TwentyFiveGigabitEthernet1/0/1
    port0_ip: 192.168.56.6/24
    port1_ip: 192.168.46.6/24
    static_arps:
      - { iface: TwentyFiveGigabitEthernet1/0/0, ip: 192.168.56.5, mac: "64:9d:99:ff:e6:cf" }
      - { iface: TwentyFiveGigabitEthernet1/0/0, ip: 192.168.56.1, mac: "64:9D:99:FF:F5:7B" }
      - { iface: TwentyFiveGigabitEthernet1/0/1, ip: 192.168.46.4, mac: "64:9d:99:ff:e7:af" }
      - { iface: TwentyFiveGigabitEthernet1/0/1, ip: 192.168.46.1, mac: "64:9D:99:FF:F5:7A" }

